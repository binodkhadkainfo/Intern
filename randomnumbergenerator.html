<!DOCTYPE html>
<html lang="en">
<head>
    <title>Random Number Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-lg w-96 text-center">
        <h1 class="text-3xl font-bold mb-6">Random Number Generator</h1>
        <div class="flex flex-col gap-6">
            <input id="min" type="number" placeholder="Minimum Number" class="w-full border rounded-2xl p-3">
            <input id="max" type="number" placeholder="Maximum Number" class="w-full border rounded-2xl p-3">
            <button onclick="generateRandom()" class="bg-blue-500 rounded-2xl w-[300px] hover:bg-blue-700 p-3">Generate</button>
            <h2 id="result" class="text-2xl font-bold"></h2>
        </div>
    </div>


    <script>
        function generateRandom() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);

            if (isNaN(min) || isNaN(max)) {
                alert('Please enter both numbers');
                return;
            }

            if (min > max) {
                alert('Minimum number must be less than maximum number');
                return;
            }

            const randomNumber =
                Math.floor(Math.random() * (max - min + 1)) + min;

            document.getElementById('result').textContent = randomNumber;
        }
    </script>

</body>
</html>
