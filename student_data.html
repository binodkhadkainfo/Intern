<!DOCTYPE html>
<html lang="en">
<head>
   <title>Student Data</title>
   <link rel="stylesheet" href="student_data.css">
</head>
<body>
   <div class="first">
       <h1>Student Data Table</h1>

       <div class="second">
           <h2>Filter Student Table By:</h2>
           <div class="group">
               <label for="age">Age</label>
               <input type="number" id="age" placeholder="Select Age">
           </div>
           <div class="group">
               <label for="state">State</label>
               <input type="text" id="state" list="statedata" placeholder="Select State">
               <datalist id="statedata">
                   <option value="Kathmandu"></option>
                   <option value="Bhaktapur"></option>
                   <option value="Lalitpur"></option>
               </datalist>
           </div>
           <div class="group">
               <label for="level">Level</label>
               <input type="number" id="level" list="leveldata" placeholder="Select Level">
               <datalist id="leveldata">
                   <option value="100"></option>
                   <option value="200"></option>
                   <option value="300"></option>
               </datalist>
           </div>
           <div class="group">
               <label for="gender">Gender</label>
               <input type="text" id="gender" list="genderdata" placeholder="Select Gender">
               <datalist id="genderdata">
                   <option value="Male"></option>
                   <option value="Female"></option>
                   <option value="Others"></option>
               </datalist>
           </div>
           <button id="search">Search</button>
       </div>
   </div>
   <div class="table">
    <table>
        <thead>
            <tr>
                <th>S/N</th>
                <th>Surname</th>
                <th>First Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Level</th>
                <th>State</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody class = "tablebody">
            <td>01</td>
            <td>bbb</td>
            <td>hahaha</td>
            <td>22</td>
            <td>Male</td>
            <td>100Level</td>
            <td>Kathmandu</td>
            <td><button class = "butt">
                Download Result
            </button></td>
            
        </tbody>
         <tbody class = "tablebody">
            <td>02</td>
            <td>badsbb</td>
            <td>hahasdfsdafaha</td>
            <td>222</td>
            <td>Female</td>
            <td>200Level</td>
            <td>Kathmandu</td>
            <td><button class = "butt">
                Download Result
            </button>
        </td>
        </tbody>
    </table>
   </div>
</body>
</html>
