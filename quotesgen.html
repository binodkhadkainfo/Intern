<!DOCTYPE html>
<html lang="en">
<head>
    <title>Random Quotes Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Random Quete Generator</h1>
        <p id="quote" class="text-xl italic text-gray-700 mb-4"></p>
        <p id="author" class="text-gray-500 mb-6"></p>

        <button
            onclick="generateQuote()"
            class="bg-blue-600 hover:bg-blue-900 text-white px-6 py-3 rounded-lg transition duration-300">
            New Quote
        </button>
      
    </div>
    <script>
        const quotes = [
            {
                quote: "The best way to get started is to quit talking and begin doing.",
                author: "Walt Disney"
            },
            {
                quote: "Success is not final, failure is not fatal: It is the courage to continue that counts.",
                author: "Winston Churchill"
            },
            {
                quote: "Don't watch the clock; do what it does. Keep going.",
                author: "Sam Levenson"
            },
            {
                quote: "Believe you can and you're halfway there.",
                author: "Theodore Roosevelt"
            },
            {
                quote: "Dream big and dare to fail.",
                author: "Norman Vaughan"
            },
            {
                quote: "Your future is created by what you do today, not tomorrow.",
                author: "Robert Kiyosaki"
            },
            {
                quote: "Stay hungry. Stay foolish.",
                author: "Steve Jobs"
            },
            {
                quote: "Do something today that your future self will thank you for.",
                author: "Unknown"
            }
        ];
        function generateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").textContent =`"${quotes[randomIndex].quote}"`;
            document.getElementById("author").textContent =`— ${quotes[randomIndex].author}`;
        }
        generateQuote();
    </script>

</body>
</html>
