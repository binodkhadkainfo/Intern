<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Sign Up Here</h1>
        <p class="text-center text-gray-500 mb-8">
            Sign up to create your account and unlock exclusive features!
        </p>
        <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="username" class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Username<i class="ri-user-line text-lg"></i></label>
                    <input id="username" type="text" placeholder="Enter username"class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label for="email" class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Email<i class="ri-mail-line text-lg"></i></label>
                    <input id="email" type="email" placeholder="Enter email"class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label for="password" class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Password<i class="ri-lock-line text-lg"></i></label>
                    <input id="password" type="password" placeholder="Enter password"class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label for="address" class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Address<i class="ri-map-pin-line text-lg"></i></label>
                    <input id="address" type="text" placeholder="Enter address"class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label for="phone" class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Phone<i class="ri-phone-line text-lg"></i></label>
                    <input id="phone" type="tel" placeholder="Enter phone number"class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="flex items-center gap-3 mb-2 text-gray-700 font-medium">Gender<i class="ri-women-line"></i></label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2"><input type="radio" name="gender">Male</label>
                        <label class="flex items-center gap-2"><input type="radio" name="gender">Female</label>
                        <label class="flex items-center gap-2"><input type="radio" name="gender">Others</label>
                    </div>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
                Register
            </button>
        </form>
        <div class="text-center mt-6">
            <p class="text-gray-600">Already have an account?</p>
            <a href="#" class="text-blue-600 hover:text-blue-800 font-medium">Login</a>
        </div>
    </div>
</body>
</html>
