<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div id="box">
        <h1>Sign Up Here</h1>
        <h6>Sign up to create your account and unlock exclusive features!</h6>
        <form>
            <div class="row">
                <div class="inputgroup">
                    <label for="username">Username<i class="ri-user-line"></i></label>
                    <input type="text" id="username">
                </div>
                <div class="inputgroup">
                    <label for="email">Email<i class="ri-mail-line"></i></label>
                    <input type="email" id="email">
                </div>
            </div>
            <div class="row">
                <div class="inputgroup">
                    <label for="password">Password<i class="ri-lock-line"></i></label>
                    <input type="password" id="password">
                </div>
                <div class="inputgroup">
                    <label for="address">Address<i class="ri-map-pin-line"></i></label>
                    <input type="text" id="address">
                </div>
            </div>
            <div class="row">
                <div class="inputgroup">
                    <label for="phone">Phone<i class="ri-phone-line"></i></label>
                    <input type="number" id="phone">
                </div>
                <div class="inputgroup">
                    <label>Gender<i class="ri-women-line"></i></label>
                    <div class="gender">
                        <label>
                            <input type="radio" name="gender" value="male">
                            male
                        </label>
                        <label>
                            <input type="radio" name="gender" value="female">
                            female
                        </label>
                        <label>
                            <input type="radio" name="gender" value="others">
                            others
                        </label>
                    </div>
                </div>
            </div>
                <button type="submit">Register</button>
            </form>
            <a href="#">Already have an account?</a>
            <a href="#">Login</a>
        </p>
</body>
</html>
